<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - SmartFixer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        .friend-selection-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: var(--shadow);
            margin: 1rem;
            overflow: hidden;
        }

        .friend-selection-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .friend-selection-header h2 {
            margin: 0;
            color: var(--text-color);
            font-size: 1.2rem;
        }

        .close-friend-selection {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-color);
            padding: 0.5rem;
        }

        .friend-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .friend-item {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 0.5rem;
        }

        .friend-item:hover {
            background-color: var(--hover-bg);
        }

        .friend-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 1rem;
        }

        .friend-info {
            flex: 1;
        }

        .friend-name {
            font-weight: 600;
            color: var(--text-color);
        }

        .friend-username {
            font-size: 0.8rem;
            color: #888;
        }

        .no-friends {
            text-align: center;
            padding: 2rem;
            color: #888;
        }

        /* Existing styles */
        .chat-page-container {
            height: calc(100vh - 60px);
            padding: 1rem;
            box-sizing: border-box;
        }

        .chat-layout {
            display: flex;
            height: 100%;
            gap: 1rem;
        }

        .chat-sidebar {
            width: 300px;
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-search {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .search-input {
            width: 100%;
            padding: 0.5rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-color);
            box-sizing: border-box;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .chat-item:hover,
        .chat-item.active {
            background-color: var(--hover-bg);
        }

        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 1rem;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 600;
            color: #333 !important;
            /* Darker color for light mode visibility */
            margin-bottom: 0.25rem;
        }

        [data-theme="dark"] .chat-name {
            color: var(--text-color) !important;
        }

        .chat-username {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.25rem;
        }

        .chat-last-message {
            font-size: 0.85rem;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 0.75rem;
            color: #888;
        }

        .online-status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #ccc;
            margin-left: 0.5rem;
        }

        .online-status-indicator.online {
            background-color: #4CAF50;
        }

        .online-status-indicator.offline {
            background-color: #ccc;
        }

        .unread-badge {
            background-color: #ff3b30;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 14px;
            text-align: center;
            margin-left: auto;
        }

        .chat-item-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            margin-left: 0.5rem;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .current-chat-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 1rem;
        }

        .current-chat-info {
            flex: 1;
        }

        .current-chat-name {
            font-weight: 600;
            color: var(--text-color);
        }

        .current-chat-status {
            font-size: 0.8rem;
            color: #888;
        }

        .chat-actions {
            display: flex;
            gap: 0.5rem;
        }

        .chat-action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: background-color 0.2s;
            color: var(--text-color);
        }

        .chat-action-btn:hover {
            background-color: var(--hover-bg);
        }

        .chat-messages {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            display: flex;
            margin-bottom: 1rem;
            max-width: 80%;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 0.5rem;
        }

        .message-content {
            display: flex;
            flex-direction: column;
        }

        .message-text {
            padding: 0.5rem 1rem;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.sent .message-text {
            background-color: #007bff;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-text {
            background-color: #f1f1f1;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 0.7rem;
            color: #888;
            margin-top: 0.25rem;
            align-self: flex-end;
        }

        .chat-input-container {
            display: flex;
            align-items: center;
            padding: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .attach-btn,
        .code-btn,
        .send-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: background-color 0.2s;
            color: var(--text-color);
        }

        .attach-btn:hover,
        .code-btn:hover,
        .send-btn:hover {
            background-color: var(--hover-bg);
        }

        #chatInput {
            flex: 1;
            padding: 0.75rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-color);
            margin: 0 0.5rem;
        }

        /* Dark mode styles */
        [data-theme="dark"] .message.received .message-text {
            background-color: #444;
            color: white;
        }

        [data-theme="dark"] .search-input,
        [data-theme="dark"] #chatInput {
            background: #333;
            border-color: #555;
        }

        [data-theme="dark"] .friend-item:hover,
        [data-theme="dark"] .chat-item:hover,
        [data-theme="dark"] .chat-item.active {
            background-color: #333;
        }

        [data-theme="dark"] .attach-btn:hover,
        [data-theme="dark"] .code-btn:hover,
        [data-theme="dark"] .send-btn:hover,
        [data-theme="dark"] .chat-action-btn:hover {
            background-color: #333;
        }

        [data-theme="dark"] .friend-selection-container,
        [data-theme="dark"] .chat-sidebar,
        [data-theme="dark"] .chat-main {
            background: #222;
        }

        [data-theme="dark"] .friend-selection-header,
        [data-theme="dark"] .chat-search,
        [data-theme="dark"] .chat-header-info,
        [data-theme="dark"] .chat-input-container {
            border-color: #444;
        }

        .no-chats {
            text-align: center;
            padding: 2rem;
            color: #888;
        }

        .new-chat-link {
            background: none;
            border: none;
            color: #007bff;
            cursor: pointer;
            text-decoration: underline;
            font-size: 1rem;
        }

        .new-chat-link:hover {
            color: #0056b3;
        }

        /* Image Lightbox */
        .image-lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            background: none;
            border: none;
        }

        .lightbox-close:hover {
            color: #bbb;
        }

        /* Media fullscreen modal: image/video/file with download */
        .media-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .media-modal.show { display: flex; }
        .media-modal .media-close, .media-modal .media-download {
            position: absolute;
            color: #fff;
            background: rgba(0,0,0,0.5);
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        .media-modal .media-close { top: 20px; right: 20px; }
        .media-modal .media-download { bottom: 20px; right: 20px; }
        .media-modal .media-content { max-width: 95%; max-height: 85%; object-fit: contain; }
        .media-modal video.media-content { width: 90%; max-height: 80%; }

        /* Typing indicator */
        .typing-indicator {
            font-size: 0.85rem;
            color: #888;
            padding: 4px 12px;
            font-style: italic;
        }

        /* Message status icons */
        .message-status { margin-left: 4px; font-size: 0.75rem; }
        .message-status.sent { color: #888; }
        .message-status.delivered { color: #888; }
        .message-status.seen { color: #007bff; }

        /* Code message expand */
        .code-message-preview { max-height: 120px; overflow: hidden; cursor: pointer; }
        .code-message-full { max-height: 400px; overflow: auto; }

        /* Code send modal */
        .modal-overlay {
            display: none;
            position: fixed;
            z-index: 1500;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            min-width: 400px;
            max-width: 90%;
            max-height: 80vh;
            overflow: auto;
        }
        .modal-box textarea { width: 100%; min-height: 200px; padding: 8px; border-radius: 8px; margin-bottom: 10px; }
        .modal-box .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }

        /* Call modal */
        .call-modal { display: none; position: fixed; z-index: 2500; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; flex-direction: column; color: #fff; }
        .call-modal.show { display: flex; }
        .call-modal .call-duration { font-size: 1.5rem; margin: 1rem 0; }
        .call-modal .call-actions { display: flex; gap: 1rem; margin-top: 1rem; }
        .call-modal .call-actions button { width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer; font-size: 1.2rem; }
        .call-modal .call-accept { background: #4CAF50; color: #fff; }
        .call-modal .call-reject { background: #f44336; color: #fff; }
        .call-modal .call-end { background: #f44336; color: #fff; }
        .call-modal video { max-width: 100%; max-height: 50vh; border-radius: 8px; background: #000; }
        .call-modal .remote-video { width: 100%; }
        .call-modal .local-video { width: 200px; position: absolute; bottom: 80px; right: 20px; }
    </style>
</head>

<body>
    <div class="nav-bar">
        <div class="nav-left">
            <button class="back-btn" onclick="goBack()" title="Back">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5" />
                    <path d="M12 19l-7-7 7-7" />
                </svg>
            </button>
            <div class="brand-logo">Messages</div>
        </div>

        <div class="nav-right">
            <div class="theme-toggle tooltip" data-tooltip="Theme" onclick="toggleTheme()" title="Theme">
                <svg class="theme-icon moon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
                <svg class="theme-icon sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" style="display: none;">
                    <circle cx="12" cy="12" r="5" />
                    <line x1="12" y1="1" x2="12" y2="3" />
                    <line x1="12" y1="21" x2="12" y2="23" />
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                    <line x1="1" y1="12" x2="3" y2="12" />
                    <line x1="21" y1="12" x2="23" y2="12" />
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                </svg>
            </div>

            <button class="new-chat-btn" onclick="startNewChat()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14" />
                </svg>
                New Chat
            </button>
        </div>
    </div>

    <div class="chat-page-container">
        <div class="chat-layout">
            <div class="chat-sidebar">
                <div class="chat-search">
                    <input type="text" placeholder="Search users..." class="search-input" oninput="searchUsers()">
                </div>

                <div class="chat-list" id="chatList">
                    <!-- Chat items will be loaded dynamically -->
                </div>
            </div>

            <!-- Friend Selection Interface -->
            <div class="friend-selection-container" style="display: none;">
                <div class="friend-selection-header">
                    <h2>Select a Friend to Chat With</h2>
                    <button class="close-friend-selection" onclick="hideFriendSelection()">×</button>
                </div>
                <div class="friend-list" id="friendList">
                    <!-- Friends will be loaded dynamically -->
                </div>
            </div>

            <div class="chat-main">
                <div class="chat-header-info" id="chatHeaderInfo">
                    <img src="https://via.placeholder.com/32" alt="Profile" class="current-chat-avatar">
                    <div class="current-chat-info">
                        <div class="current-chat-name">Select a chat</div>
                        <div class="current-chat-status">Offline</div>
                    </div>
                    <div class="chat-actions">
                        <button class="chat-action-btn" title="Video Call" onclick="startVideoCall()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polygon points="23 7 16 12 23 17 23 7" />
                                <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
                            </svg>
                        </button>
                        <button class="chat-action-btn" title="Voice Call" onclick="startVoiceCall()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path
                                    d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <div id="chatMessagesList"></div>
                    <div id="typingIndicator" class="typing-indicator" style="display:none;">Typing...</div>
                </div>

                <div class="chat-input-container">
                    <button class="attach-btn" title="Attach File" onclick="attachFile()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path
                                d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
                        </svg>
                    </button>
                    <input type="text" id="chatInput" placeholder="Type a message..."
                        onkeypress="handleChatEnter(event)" oninput="emitTyping(true)">
                    <button class="code-btn" title="Share Code" onclick="shareCodeInChat()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="16,18 22,12 16,6" />
                            <polyline points="8,6 2,12 8,18" />
                        </svg>
                    </button>
                    <button class="send-btn" onclick="sendMessage()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13" />
                            <polygon points="22,2 15,22 11,13 2,9 22,2" />
                        </svg>
                    </button>
                    <input type="file" id="fileInput" style="display: none;" onchange="handleFileSelect(event)">
                </div>
            </div>
        </div>
    </div>

    <script>
        // Navigation history management
        const currentUserId = "{{ user.id }}";
        let navigationHistory = JSON.parse(sessionStorage.getItem('navigationHistory') || '[]');
        let socket;
        let currentChatUser = null;
        let allChats = [];
        let chatHistory = JSON.parse(localStorage.getItem('chatHistory') || '{}');
        let searchTimeout;
        let typingTimeout;
        const MAX_FILE_SIZE_MB = 25;
        let currentMediaUrl = '';
        let callStartTime = null;
        let callDurationInterval = null;
        let peerConnection = null;
        let localStream = null;
        let currentCallPeerId = null;
        let isVideoCall = true;

        function updateNavigationHistory() {
            const currentPath = window.location.pathname;
            if (navigationHistory.length === 0 || navigationHistory[navigationHistory.length - 1] !== currentPath) {
                navigationHistory.push(currentPath);
                if (navigationHistory.length > 10) {
                    navigationHistory.shift();
                }
                sessionStorage.setItem('navigationHistory', JSON.stringify(navigationHistory));
            }
        }

        function goBack() {
            // Go back to the editor page
            window.location.href = '/editor';
        }

        function toggleTheme() {
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);

            if (newTheme === 'dark') {
                document.querySelector('.moon').style.display = 'none';
                document.querySelector('.sun').style.display = 'block';
            } else {
                document.querySelector('.moon').style.display = 'block';
                document.querySelector('.sun').style.display = 'none';
            }
        }

        function startNewChat() {
            // Show friend selection interface
            showFriendSelection();
        }

        function showFriendSelection() {
            // Hide chat interface and show friend selection
            document.querySelector('.chat-main').style.display = 'none';
            document.querySelector('.friend-selection-container').style.display = 'block';

            // Load friends for selection
            loadFriendsForSelection();
        }

        function hideFriendSelection() {
            // Show chat interface and hide friend selection
            document.querySelector('.friend-selection-container').style.display = 'none';
            document.querySelector('.chat-main').style.display = 'flex';
        }

        async function loadFriendsForSelection() {
            try {
                const response = await fetch('/api/friends');
                const friends = await response.json();
                displayFriendsForSelection(friends);
            } catch (error) {
                console.error('Error loading friends:', error);
            }
        }

        function displayFriendsForSelection(friends) {
            const friendList = document.getElementById('friendList');
            if (friends && friends.length > 0) {
                friendList.innerHTML = friends.map(friend => `
                    <div class="friend-item" onclick="selectFriend('${friend.id}')">
                        <img src="${friend.image || 'https://via.placeholder.com/40'}" alt="Profile" class="friend-avatar">
                        <div class="friend-info">
                            <div class="friend-name">${friend.name}</div>
                            <div class="friend-username">@${friend.username}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                friendList.innerHTML = '<div class="no-friends">No friends found</div>';
            }
        }

        function selectFriend(userId) {
            // Hide friend selection and show chat
            hideFriendSelection();

            // Open chat with selected friend
            openChat(userId);

            // Update chat history
            chatHistory.lastChat = userId;
            localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
        }

        async function loadChats() {
            try {
                const response = await fetch('/api/chat/conversations');
                const convs = await response.json();
                allChats = convs;
                displayChats(convs);

                // Auto-select last chat or show friend selection for first-time users
                autoSelectChat(convs);
            } catch (error) {
                console.error('Error loading chats:', error);
                // Show friend selection on error as fallback
                showFriendSelection();
            }
        }

        function searchUsers() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const searchTerm = document.querySelector('.search-input').value.toLowerCase();
                if (searchTerm.length > 0) {
                    // Search for users
                    fetch(`/api/search-users-chat?q=${encodeURIComponent(searchTerm)}`)
                        .then(response => response.json())
                        .then(users => {
                            if (Array.isArray(users)) {
                                allChats = users; // So openChat() can find the selected user when clicking a search result
                                displayChats(users);
                            }
                        })
                        .catch(error => {
                            console.error('Error searching users:', error);
                        });
                } else {
                    // Load all friends if search is empty
                    loadChats();
                }
            }, 300); // Debounce for 300ms
        }

        function displayChats(chats) {
            const chatList = document.getElementById('chatList');
            if (chats && chats.length > 0) {
                chatList.innerHTML = chats.map(conv => {
                    // conv might be just a friend object if from search
                    const friend = conv.other_user || conv;
                    const lastMsg = conv.last_message || { content: '', type: 'text', timestamp: null };
                    const timeStr = lastMsg.timestamp ? formatTime(lastMsg.timestamp) : '';
                    const unreadCount = conv.unread_count || 0;

                    let lastMsgContent = lastMsg.content;
                    if (lastMsg.type === 'image') lastMsgContent = '📷 Photo';
                    else if (lastMsg.type === 'video') lastMsgContent = '🎥 Video';
                    else if (lastMsg.type === 'code') lastMsgContent = '💻 Code';
                    else if (lastMsg.type === 'file') lastMsgContent = '📎 File';

                    return `
                        <div class="chat-item ${currentChatUser === friend.id ? 'active' : ''}" id="chat-item-${friend.id}">
                            <img src="${friend.image || 'https://via.placeholder.com/40'}" alt="Profile" class="chat-avatar" onclick="window.location.href='/user/${friend.id}'" style="cursor: pointer;">
                            <div class="chat-info" onclick="openChat('${friend.id}')" style="cursor: pointer;">
                                <div style="display: flex; justify-content: space-between; align-items: baseline;">
                                    <div class="chat-name">${friend.name}</div>
                                    <div class="chat-time">${timeStr}</div>
                                </div>
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <div class="chat-last-message">${lastMsgContent}</div>
                                    ${unreadCount > 0 ? `<div class="unread-badge" id="unread-badge-${friend.id}">${unreadCount}</div>` : `<div class="unread-badge" id="unread-badge-${friend.id}" style="display: none;"></div>`}
                                </div>
                            </div>
                            <div class="online-status-indicator ${friend.is_online ? 'online' : 'offline'}" id="online-status-${friend.id}"></div>
                        </div>
                    `;
                }).join('');
            } else {
                chatList.innerHTML = '<div class="no-chats">No messages yet. <button onclick="startNewChat()" class="new-chat-link">Start a conversation</button></div>';
            }
        }

        function searchChats() {
            const searchTerm = document.querySelector('.search-input').value.toLowerCase();
            const filteredChats = allChats.filter(chat =>
                chat.name.toLowerCase().includes(searchTerm)
            );
            displayChats(filteredChats);
        }

        async function openChat(userId) {
            // Remove active class from all chat items
            document.querySelectorAll('.chat-item').forEach(item => item.classList.remove('active'));

            const chatItem = document.getElementById(`chat-item-${userId}`);
            if (chatItem) {
                chatItem.classList.add('active');
            }

            currentChatUser = userId;

            // Clear unread badge
            const badge = document.getElementById(`unread-badge-${userId}`);
            if (badge) {
                badge.style.display = 'none';
                badge.textContent = '0';
            }

            // Update chat header info (from conversation list or from search results)
            let friend = null;
            const userIdStr = String(userId);
            for (let conv of allChats) {
                if (conv.other_user && String(conv.other_user.id) === userIdStr) {
                    friend = conv.other_user;
                    break;
                }
                if (String(conv.id) === userIdStr) {
                    friend = conv;
                    break;
                }
            }

            if (friend) {
                document.querySelector('.current-chat-name').textContent = friend.name || friend.username || 'User';
                document.querySelector('.current-chat-avatar').src = friend.image || 'https://via.placeholder.com/32';
                updateUserPresenceIndicator({ user_id: friend.id, is_online: friend.is_online, last_seen: friend.last_seen });
            } else {
                document.querySelector('.current-chat-name').textContent = 'User';
                document.querySelector('.current-chat-status').textContent = '';
            }

            // Load chat messages
            await loadChatMessages(userId);
        }

        async function loadChatMessages(userId) {
            try {
                const response = await fetch(`/api/messages/${userId}`);
                const messages = await response.json();
                displayMessages(messages);
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        function formatMessageStatus(isSent, status) {
            if (!isSent) return '';
            if (status === 'seen') return ' <span class="message-status seen" title="Seen">✓✓</span>';
            if (status === 'delivered') return ' <span class="message-status delivered" title="Delivered">✓✓</span>';
            return ' <span class="message-status sent" title="Sent">✓</span>';
        }

        function buildMessageContent(msg, isSent) {
            const type = msg.message_type || (msg.file_attachment ? msg.file_type : 'text');
            const url = (msg.file_attachment || '').replace(/'/g, "\\'");
            if (msg.file_attachment) {
                if (type === 'image') {
                    return `<img src="${escapeHtml(url)}" alt="Image" style="max-width: 300px; max-height: 300px; border-radius: 8px; cursor: pointer;" onclick="openMediaModal('image','${escapeHtml(url)}')">`;
                } else if (type === 'video') {
                    return `<video controls style="max-width: 300px; max-height: 300px; border-radius: 8px;" onclick="event.stopPropagation(); openMediaModal('video','${escapeHtml(url)}')">
                        <source src="${escapeHtml(url)}" type="video/mp4">Your browser does not support the video tag.</video>`;
                } else if (type === 'pdf') {
                    return `<a href="${escapeHtml(url)}" target="_blank" rel="noopener" style="display: inline-block; padding: 10px; background: #f0f0f0; border-radius: 8px; text-decoration: none; color: #333;">📄 PDF Document</a> <button type="button" onclick="openMediaModal('file','${escapeHtml(url)}')" style="margin-left:8px;">Open</button>`;
                } else {
                    return `<a href="${escapeHtml(url)}" target="_blank" rel="noopener" style="display: inline-block; padding: 10px; background: #f0f0f0; border-radius: 8px; text-decoration: none; color: #333;">📎 Download File</a>`;
                }
            }
            if (type === 'code' || msg.code_snippet) {
                const raw = (msg.code_snippet || msg.content || '');
                const preview = raw.length > 200 ? raw.slice(0, 200) + '...' : raw;
                const safe = escapeHtml(preview);
                const mid = (msg.id || 'noid').toString();
                window._codeCache = window._codeCache || {};
                window._codeCache[mid] = raw;
                return `<div class="code-message-preview" data-msg-id="${mid}" onclick="toggleCodeExpand(this)"><pre><code>${safe}</code></pre></div><a href="#" onclick="downloadCodeAsTxt(this); return false;" data-msg-id="${mid}" style="font-size:0.85rem;">Download .txt</a>`;
            }
            return escapeHtml(msg.content || '');
        }

        function displayMessages(messages) {
            const list = document.getElementById('chatMessagesList');
            const container = document.getElementById('chatMessages');
            list.innerHTML = messages.map(msg => {
                const isSent = String(msg.sender_id) === String(currentUserId);
                const status = msg.is_read ? 'seen' : 'delivered';
                const messageContent = buildMessageContent(msg, isSent);
                const statusHtml = formatMessageStatus(isSent, status);
                return `
                    <div class="message ${isSent ? 'sent' : 'received'}" data-message-id="${msg.id}">
                        ${!isSent ? `<img src="${msg.sender_image || 'https://via.placeholder.com/32'}" alt="Profile" class="message-avatar">` : ''}
                        <div class="message-content">
                            <div class="message-text">${messageContent}</div>
                            <div class="message-time">${formatTime(msg.created_at)}${statusHtml}</div>
                        </div>
                    </div>
                `;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        function displayMessage(data) {
            const list = document.getElementById('chatMessagesList');
            const container = document.getElementById('chatMessages');
            const isCurrentUser = String(data.sender_id) === String(currentUserId);
            const msgId = data.id;
            const messageContent = buildMessageContent({
                id: data.id,
                message_type: data.message_type,
                file_attachment: data.file_attachment,
                file_type: data.file_type,
                code_snippet: data.code_snippet,
                content: data.content || data.message
            }, isCurrentUser);
            const status = isCurrentUser ? 'sent' : 'delivered';
            const statusHtml = formatMessageStatus(isCurrentUser, status);

            const messageElement = document.createElement('div');
            messageElement.className = `message ${isCurrentUser ? 'sent' : 'received'}`;
            if (msgId) messageElement.setAttribute('data-message-id', msgId);
            messageElement.innerHTML = `
                ${!isCurrentUser ? `<img src="${data.sender_image || 'https://via.placeholder.com/32'}" alt="Profile" class="message-avatar">` : ''}
                <div class="message-content">
                    <div class="message-text">${messageContent}</div>
                    <div class="message-time">${formatTime(data.timestamp || data.created_at)}${statusHtml}</div>
                </div>
            `;
            if (msgId && window._codeCache) {
                const raw = (data.code_snippet || data.content || '');
                if (raw) window._codeCache[msgId] = raw;
            }
            list.appendChild(messageElement);
            container.scrollTop = container.scrollHeight;

            if (!isCurrentUser && msgId && socket && socket.connected) {
                socket.emit('message_delivered', { message_id: msgId });
            }
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();

            if (!currentChatUser) {
                alert('Please select a chat first.');
                return;
            }

            if (!message) return;

            const payload = { receiver_id: currentChatUser, content: message, message_type: 'text' };
            const tempId = 'temp_' + Date.now();

            function doSend(retriesLeft) {
                fetch('/api/send-message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                    .then(function (response) {
                        if (!response.ok) throw new Error('Network response not ok');
                        return response.json();
                    })
                    .then(function (data) {
                        if (data.success) {
                            input.value = '';
                            updateSidebarLastMessage(currentChatUser, message, 'text', new Date().toISOString());
                            var existing = document.querySelector('[data-message-id="' + tempId + '"]');
                            if (existing && data.message_id) existing.setAttribute('data-message-id', data.message_id);
                        } else {
                            if (retriesLeft > 0) {
                                setTimeout(function () { doSend(retriesLeft - 1); }, 1000);
                            } else {
                                alert('Failed to send: ' + (data.error || 'Unknown error'));
                            }
                        }
                    })
                    .catch(function (err) {
                        if (retriesLeft > 0) {
                            setTimeout(function () { doSend(retriesLeft - 1); }, 1000);
                        } else {
                            console.error('Error sending message:', err);
                        }
                    });
            }

            appendOptimisticMessage(tempId, message, 'text');
            input.value = '';
            doSend(2);
        }

        function appendOptimisticMessage(tempId, content, messageType) {
            var list = document.getElementById('chatMessagesList');
            var container = document.getElementById('chatMessages');
            var html = '<div class="message sent" data-message-id="' + tempId + '">' +
                '<div class="message-content">' +
                '<div class="message-text">' + escapeHtml(content) + '</div>' +
                '<div class="message-time">' + formatTime(new Date().toISOString()) + ' <span class="message-status sent" title="Sent">✓</span></div>' +
                '</div></div>';
            list.insertAdjacentHTML('beforeend', html);
            container.scrollTop = container.scrollHeight;
        }

        function updateSidebarLastMessage(userId, content, type, timestamp) {
            var lastContent = content;
            if (type === 'image') lastContent = 'Photo';
            else if (type === 'video') lastContent = 'Video';
            else if (type === 'code') lastContent = 'Code';
            else if (type === 'file') lastContent = 'File';
            else if (content && content.length > 30) lastContent = content.slice(0, 30) + '...';
            var item = document.getElementById('chat-item-' + userId);
            if (!item) return;
            var lastEl = item.querySelector('.chat-last-message');
            if (lastEl) lastEl.textContent = lastContent;
            var timeEl = item.querySelector('.chat-time');
            if (timeEl) timeEl.textContent = formatTime(timestamp);
        }

        function handleChatEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function emitTyping(isStart) {
            if (!currentChatUser || !socket || !socket.connected) return;
            if (typingTimeout) clearTimeout(typingTimeout);
            socket.emit(isStart ? 'typing_start' : 'typing_stop', { to_user_id: currentChatUser });
            if (isStart) typingTimeout = setTimeout(function () { emitTyping(false); }, 2000);
        }

        function attachFile() {
            document.getElementById('fileInput').click();
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!currentChatUser) {
                alert('Please select a chat first.');
                event.target.value = '';
                return;
            }
            if (file.size > MAX_FILE_SIZE_MB * 1024 * 1024) {
                alert('File too large. Maximum size is ' + MAX_FILE_SIZE_MB + 'MB.');
                event.target.value = '';
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            // Instant UI feedback
            const list = document.getElementById('chatMessagesList');
            const container = document.getElementById('chatMessages');
            const placeholder = document.createElement('div');
            placeholder.className = 'message sent';
            placeholder.innerHTML = `<div class="message-content"><div class="message-text">Uploading ${file.name}...</div></div>`;
            list.appendChild(placeholder);
            container.scrollTop = container.scrollHeight;

            // Step 1: Upload to server
            fetch('/api/upload-file', { method: 'POST', body: formData })
                .then(function (res) { return res.json(); })
                .then(function (uploadData) {
                    if (!uploadData.success) throw new Error(uploadData.error || 'Upload failed');
                    return fetch('/api/send-message', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            receiver_id: currentChatUser,
                            content: '',
                            message_type: uploadData.file_type || 'file',
                            file_attachment: uploadData.file_path,
                            file_type: uploadData.file_type
                        })
                    }).then(function (r) { return r.json(); }).then(function (sendRes) {
                        placeholder.remove();
                        if (!sendRes.success) {
                            if (sendRes.error) alert('Upload failed: ' + sendRes.error);
                            return;
                        }
                        event.target.value = '';
                        if (sendRes.message_id) {
                            var payload = { id: sendRes.message_id, sender_id: currentUserId, receiver_id: currentChatUser, message_type: uploadData.file_type || 'file', file_attachment: uploadData.file_path, file_type: uploadData.file_type, content: '', timestamp: new Date().toISOString(), sender_image: null };
                            displayMessage(payload);
                            updateSidebarLastMessage(currentChatUser, uploadData.file_type === 'image' ? 'Photo' : (uploadData.file_type === 'video' ? 'Video' : 'File'), uploadData.file_type || 'file', new Date().toISOString());
                        }
                    });
                })
                .catch(function (err) {
                    placeholder.remove();
                    if (err && err.message && err.message !== 'Upload failed') console.error('Chat Upload Error:', err);
                    event.target.value = '';
                });
        }

        function shareCodeInChat() {
            if (!currentChatUser) {
                alert('Please select a chat first.');
                return;
            }

            // Get code from session storage or prompt user
            const code = sessionStorage.getItem('uploadedCode') || '';

            if (code) {
                // Send code as a message
                fetch('/api/send-message', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        receiver_id: currentChatUser,
                        content: 'Check out this code:',
                        message_type: 'code',
                        code_snippet: code
                    })
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            document.getElementById('chatInput').value = '';
                        } else {
                            alert('Failed to share code: ' + (data.error || 'Unknown error'));
                        }
                    })
                    .catch(error => {
                        console.error('Error sharing code:', error);
                    });
            } else {
                alert('No code available to share. Please upload or write some code first.');
            }
        }

        function startVideoCall() {
            if (!currentChatUser || !socket || !socket.connected) {
                alert('Please select a chat and ensure you are connected.');
                return;
            }
            isVideoCall = true;
            startCallAsCaller(true);
        }

        function startVoiceCall() {
            if (!currentChatUser || !socket || !socket.connected) {
                alert('Please select a chat and ensure you are connected.');
                return;
            }
            isVideoCall = false;
            startCallAsCaller(false);
        }

        function startCallAsCaller(video) {
            document.getElementById('activeCallText').textContent = 'Calling...';
            document.getElementById('activeCallModal').classList.add('show');
            document.getElementById('localVideo').style.display = video ? 'block' : 'none';
            document.getElementById('remoteVideo').style.display = 'none';
            currentCallPeerId = currentChatUser;
            getUserMedia(video).then(function (stream) {
                localStream = stream;
                if (document.getElementById('localVideo')) document.getElementById('localVideo').srcObject = stream;
                peerConnection = createPeerConnection(false);
                if (peerConnection && stream.getTracks) {
                    stream.getTracks().forEach(function (track) { peerConnection.addTrack(track, stream); });
                } else if (peerConnection && peerConnection.addStream) {
                    peerConnection.addStream(stream);
                }
                peerConnection.createOffer().then(function (offer) {
                    return peerConnection.setLocalDescription(offer);
                }).then(function () {
                    socket.emit('call_request', { to_user_id: currentCallPeerId, offer: peerConnection.localDescription, is_video: video });
                }).catch(function (err) { console.error(err); endCall(); });
            }).catch(function (err) { console.error('getUserMedia failed', err); endCall(); });
        }

        function getUserMedia(video) {
            return navigator.mediaDevices.getUserMedia({ audio: true, video: video ? true : false });
        }

        function createPeerConnection(isAnswer) {
            var RTCPC = window.RTCPeerConnection || window.mozRTCPeerConnection || window.webkitRTCPeerConnection;
            if (!RTCPC) return null;
            var pc = new RTCPC({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            pc.onicecandidate = function (e) {
                if (e.candidate && socket && currentCallPeerId)
                    socket.emit('call_ice', { to_user_id: currentCallPeerId, candidate: e.candidate });
            };
            pc.onaddstream = function (e) {
                var rv = document.getElementById('remoteVideo');
                if (rv && e.stream) { rv.srcObject = e.stream; rv.style.display = 'block'; }
            };
            pc.ontrack = function (e) {
                var rv = document.getElementById('remoteVideo');
                if (rv && e.streams && e.streams[0]) { rv.srcObject = e.streams[0]; rv.style.display = 'block'; }
            };
            return pc;
        }

        function endCall() {
            if (callDurationInterval) clearInterval(callDurationInterval);
            callDurationInterval = null;
            callStartTime = null;
            document.getElementById('activeCallModal').classList.remove('show');
            document.getElementById('incomingCallModal').classList.remove('show');
            if (localStream) { localStream.getTracks().forEach(function (t) { t.stop(); }); localStream = null; }
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            if (currentCallPeerId && socket) socket.emit('call_end', { to_user_id: currentCallPeerId });
            currentCallPeerId = null;
            var rv = document.getElementById('remoteVideo');
            if (rv) { rv.srcObject = null; rv.style.display = 'none'; }
            var lv = document.getElementById('localVideo');
            if (lv) { lv.srcObject = null; lv.style.display = 'none'; }
        }

        function startCallDuration() {
            callStartTime = Date.now();
            var el = document.getElementById('activeCallDuration');
            if (!el) return;
            callDurationInterval = setInterval(function () {
                var s = Math.floor((Date.now() - callStartTime) / 1000);
                var m = Math.floor(s / 60);
                el.textContent = (m < 10 ? '0' : '') + m + ':' + (s % 60 < 10 ? '0' : '') + (s % 60);
            }, 1000);
        }
    </script>

    <script>
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Update friend's online status
        function updateFriendStatus(userId) {
            console.log(`Fetching status for user ${userId}...`);
            fetch(`/api/user-status/${userId}`)
                .then(response => response.json())
                .then(data => {
                    console.log(`Status for user ${userId}:`, data);
                    updateUserPresenceIndicator(data);
                })
                .catch(error => {
                    console.error('Error updating friend status:', error);
                });
        }

        // Load theme and initialize on page load
        document.addEventListener('DOMContentLoaded', function () {
            const theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
                document.querySelector('.moon').style.display = 'none';
                document.querySelector('.sun').style.display = 'block';
            }

            updateNavigationHistory();

            // Initialize Socket.IO
            socket = io();

            // Log connection state and join personal room
            socket.on('connect', () => {
                console.log('Socket Connected:', socket.id);
                // Backend now joins us to user_{{ user.id }} automatically on connect,
                // but we can explicitly emit to be safe if desired.
                socket.emit('join', { room: `user_${currentUserId}` });
                socket.emit('chat_window_opened', { status: 'online', page: 'chat' });
            });

            socket.on('disconnect', (reason) => {
                console.log('Socket Disconnected:', reason);
            });

            socket.on('new_message', function (data) {
                var isFromOther = String(data.sender_id) !== String(currentUserId);
                var isForCurrentChat = currentChatUser && (String(data.sender_id) === String(currentChatUser) || String(data.receiver_id) === String(currentChatUser));
                if (isForCurrentChat && isFromOther) {
                    displayMessage(data);
                } else if (isForCurrentChat && !isFromOther) {
                    var existing = document.querySelector('[data-message-id="' + (data.id || '') + '"]');
                    if (!existing) displayMessage(data);
                }
                updateSidebarLastMessage(isFromOther ? data.sender_id : data.receiver_id, data.content || data.message || (data.message_type === 'code' ? 'Code' : (data.file_attachment ? 'File' : '')), data.message_type || 'text', data.timestamp || data.created_at);
            });
            socket.on('message_status', function (data) {
                var ids = data.message_ids || (data.message_id ? [data.message_id] : []);
                var status = data.status || 'delivered';
                ids.forEach(function (mid) {
                    var el = document.querySelector('.message[data-message-id="' + mid + '"]');
                    if (!el) return;
                    var timeDiv = el.querySelector('.message-time');
                    if (!timeDiv) return;
                    var oldStatus = timeDiv.querySelector('.message-status');
                    if (oldStatus) oldStatus.remove();
                    var span = document.createElement('span');
                    span.className = 'message-status ' + status;
                    span.title = status === 'seen' ? 'Seen' : (status === 'delivered' ? 'Delivered' : 'Sent');
                    span.textContent = status === 'seen' ? '✓✓' : (status === 'delivered' ? '✓✓' : '✓');
                    if (status === 'seen') span.style.color = '#007bff';
                    timeDiv.appendChild(span);
                });
            });

            socket.on('unread_count_update', function (data) {
                console.log('Unread count update:', data);
                loadChats();
            });

            socket.on('unread_badge_update', function (data) {
                // Update general navbar badge if it exists
                const badge = document.querySelector('.notification-badge');
                if (badge) {
                    badge.textContent = data.count > 0 ? data.count : '';
                    badge.style.display = data.count > 0 ? 'block' : 'none';
                }
            });

            socket.on('user_presence_update', function (data) {
                updateUserPresenceIndicator(data);
            });
            socket.on('typing_start', function (data) {
                if (currentChatUser && String(data.from_user_id) === String(currentChatUser)) {
                    var el = document.getElementById('typingIndicator');
                    if (el) { el.style.display = 'block'; el.textContent = (data.from_user_name || 'Someone') + ' is typing...'; }
                }
            });
            socket.on('typing_stop', function (data) {
                if (currentChatUser && String(data.from_user_id) === String(currentChatUser)) {
                    var el = document.getElementById('typingIndicator');
                    if (el) el.style.display = 'none';
                }
            });

            socket.on('call_request', function (data) {
                window._incomingCallFrom = data.from_user_id;
                window._incomingCallOffer = data.offer;
                window._incomingCallVideo = data.is_video !== false;
                document.getElementById('incomingCallText').textContent = (data.from_user_name || 'Someone') + ' is calling...';
                document.getElementById('incomingCallModal').classList.add('show');
            });
            socket.on('call_answer', function (data) {
                if (!peerConnection || !data.answer) return;
                peerConnection.setRemoteDescription(new (window.RTCSessionDescription || window.webkitRTCSessionDescription)(data.answer)).catch(function (e) { console.error(e); });
                startCallDuration();
            });
            socket.on('call_ice', function (data) {
                if (!peerConnection || !data.candidate) return;
                peerConnection.addIceCandidate(new (window.RTCIceCandidate || window.webkitRTCIceCandidate)(data.candidate)).catch(function (e) { console.error(e); });
            });
            socket.on('call_end', function () {
                endCall();
            });
            socket.on('call_reject', function () {
                document.getElementById('activeCallModal').classList.remove('show');
                currentCallPeerId = null;
                if (peerConnection) { peerConnection.close(); peerConnection = null; }
                if (localStream) { localStream.getTracks().forEach(function (t) { t.stop(); }); localStream = null; }
            });

            document.getElementById('endCallBtn').addEventListener('click', endCall);
            document.getElementById('incomingCallAccept').addEventListener('click', function () {
                if (!window._incomingCallFrom || !window._incomingCallOffer) return;
                document.getElementById('incomingCallModal').classList.remove('show');
                currentCallPeerId = window._incomingCallFrom;
                isVideoCall = window._incomingCallVideo;
                document.getElementById('activeCallText').textContent = 'Connecting...';
                document.getElementById('activeCallModal').classList.add('show');
                document.getElementById('localVideo').style.display = isVideoCall ? 'block' : 'none';
                document.getElementById('remoteVideo').style.display = 'none';
                getUserMedia(isVideoCall).then(function (stream) {
                    localStream = stream;
                    document.getElementById('localVideo').srcObject = stream;
                    peerConnection = createPeerConnection(true);
                    if (peerConnection && stream.getTracks) stream.getTracks().forEach(function (t) { peerConnection.addTrack(t, stream); });
                    else if (peerConnection && peerConnection.addStream) peerConnection.addStream(stream);
                    peerConnection.setRemoteDescription(new (window.RTCSessionDescription || window.webkitRTCSessionDescription)(window._incomingCallOffer)).then(function () {
                        return peerConnection.createAnswer();
                    }).then(function (answer) {
                        return peerConnection.setLocalDescription(answer);
                    }).then(function () {
                        socket.emit('call_answer', { to_user_id: currentCallPeerId, answer: peerConnection.localDescription });
                        startCallDuration();
                    }).catch(function (e) { console.error(e); endCall(); });
                }).catch(function (e) { console.error(e); endCall(); });
                window._incomingCallFrom = null;
                window._incomingCallOffer = null;
            });
            document.getElementById('incomingCallReject').addEventListener('click', function () {
                if (window._incomingCallFrom && socket) socket.emit('call_reject', { to_user_id: window._incomingCallFrom });
                document.getElementById('incomingCallModal').classList.remove('show');
                window._incomingCallFrom = null;
                window._incomingCallOffer = null;
            });

            // Load chats
            loadChats();
        });

        // Handle page visibility changes (tab switching)
        document.addEventListener('visibilitychange', function () {
            if (document.hidden) {
                // User switched to another tab - mark as offline
                if (socket) {
                    socket.emit('chat_window_closed', { status: 'offline', page: 'hidden_tab' });
                }
            } else {
                // User returned to chat tab - mark as online
                if (socket) {
                    socket.emit('chat_window_opened', { status: 'online', page: 'chat' });
                }
            }
        });

        // Handle page unload (closing/navigating away)
        window.addEventListener('beforeunload', function () {
            if (socket) {
                socket.emit('chat_window_closed', { status: 'offline', page: 'navigating_away' });
            }
        });

        // Add function to update user presence indicators
        function updateUserPresenceIndicator(data) {
            const uid = data.user_id || data.id;
            if (!uid) return;
            const statusIndicator = document.getElementById(`online-status-${uid}`);
            if (statusIndicator) {
                if (data.is_online) {
                    statusIndicator.className = 'online-status-indicator online';
                    statusIndicator.title = 'Online';
                } else {
                    statusIndicator.className = 'online-status-indicator offline';
                    statusIndicator.title = data.last_seen ? formatLastSeenLabel(data.last_seen) : 'Offline';
                }
            }
            if (String(currentChatUser) === String(uid)) {
                const statusElement = document.querySelector('.current-chat-status');
                if (statusElement) {
                    if (data.is_online) {
                        statusElement.textContent = 'Online';
                        statusElement.style.color = '#4CAF50';
                    } else {
                        statusElement.textContent = formatLastSeenLabel(data.last_seen);
                        statusElement.style.color = '#888';
                    }
                }
            }
        }

        function formatLastSeenTooltip(lastSeenIso) {
            if (!lastSeenIso) return 'Offline';
            const lastSeen = new Date(lastSeenIso);
            const diffMs = Date.now() - lastSeen.getTime();
            const diffMin = Math.max(0, Math.floor(diffMs / 60000));
            if (diffMin < 1) return 'Last seen just now';
            if (diffMin === 1) return 'Last seen 1 minute ago';
            if (diffMin < 60) return `Last seen ${diffMin} minutes ago`;
            const diffHr = Math.floor(diffMin / 60);
            if (diffHr === 1) return 'Last seen 1 hour ago';
            if (diffHr < 24) return `Last seen ${diffHr} hours ago`;
            const diffDays = Math.floor(diffHr / 24);
            return `Last seen ${diffDays} day${diffDays === 1 ? '' : 's'} ago`;
        }

        function formatLastSeenLabel(lastSeenIso) {
            if (!lastSeenIso) return 'Offline';
            const d = new Date(lastSeenIso);
            const h = d.getHours();
            const m = d.getMinutes();
            const ampm = h >= 12 ? 'PM' : 'AM';
            const h12 = h % 12 || 12;
            const minStr = m < 10 ? '0' + m : m;
            return `Last seen at ${h12}:${minStr} ${ampm}`;
        }

        function autoSelectChat(friends) {
            if (!friends || friends.length === 0) {
                showFriendSelection();
                return;
            }
            function otherId(c) { return (c.other_user && c.other_user.id) ? c.other_user.id : c.id; }
            if (chatHistory.lastChat && friends.some(function (f) { return otherId(f) === chatHistory.lastChat; })) {
                setTimeout(function () { openChat(chatHistory.lastChat); }, 100);
            } else {
                setTimeout(function () { openChat(otherId(friends[0])); }, 100);
            }
        }

        function openImageLightbox(imageSrc) {
            openMediaModal('image', imageSrc);
        }

        function closeImageLightbox() {
            closeMediaModal();
        }

        function openMediaModal(type, url) {
            currentMediaUrl = url || '';
            var modal = document.getElementById('mediaModal');
            var img = document.getElementById('mediaImage');
            var video = document.getElementById('mediaVideo');
            var fileLink = document.getElementById('mediaFileLink');
            var downloadBtn = document.getElementById('mediaDownloadBtn');
            img.style.display = 'none';
            video.style.display = 'none';
            fileLink.style.display = 'none';
            video.src = '';
            if (type === 'image') {
                img.src = url;
                img.style.display = 'block';
                downloadBtn.style.display = 'block';
            } else if (type === 'video') {
                video.src = url;
                video.style.display = 'block';
                downloadBtn.style.display = 'block';
            } else {
                fileLink.href = url;
                fileLink.textContent = 'Open / Download file';
                fileLink.style.display = 'inline-block';
                downloadBtn.style.display = 'block';
            }
            modal.classList.add('show');
        }

        function closeMediaModal() {
            document.getElementById('mediaModal').classList.remove('show');
            document.getElementById('mediaVideo').pause();
            currentMediaUrl = '';
        }

        function downloadMedia() {
            if (!currentMediaUrl) return;
            var a = document.createElement('a');
            a.href = currentMediaUrl;
            a.download = currentMediaUrl.split('/').pop() || 'download';
            a.target = '_blank';
            a.click();
        }

        function toggleCodeExpand(el) {
            var msgId = el.getAttribute('data-msg-id');
            var code = (window._codeCache && window._codeCache[msgId]) ? window._codeCache[msgId] : '';
            if (el.classList.contains('code-message-full')) {
                var preview = code.length > 200 ? code.slice(0, 200) + '...' : code;
                el.classList.remove('code-message-full');
                el.innerHTML = '<pre><code>' + escapeHtml(preview) + '</code></pre>';
            } else {
                el.classList.add('code-message-full');
                el.innerHTML = '<pre><code>' + escapeHtml(code) + '</code></pre>';
            }
        }

        function downloadCodeAsTxt(linkEl) {
            var msgId = linkEl.getAttribute('data-msg-id');
            var code = (window._codeCache && window._codeCache[msgId]) ? window._codeCache[msgId] : '';
            var blob = new Blob([code], { type: 'text/plain' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'code_' + (msgId || Date.now()) + '.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        function shareCodeInChat() {
            if (!currentChatUser) {
                alert('Please select a chat first.');
                return;
            }
            document.getElementById('codeSendText').value = (sessionStorage.getItem('uploadedCode') || '').trim();
            document.getElementById('codeSendModal').classList.add('show');
        }

        function closeCodeSendModal() {
            document.getElementById('codeSendModal').classList.remove('show');
        }

        function submitCodeMessage() {
            var raw = (document.getElementById('codeSendText').value || '').trim();
            if (!raw) return;
            var sanitized = escapeHtml(raw).replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"');
            closeCodeSendModal();
            fetch('/api/send-message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    receiver_id: currentChatUser,
                    content: '',
                    message_type: 'code',
                    code_snippet: raw
                })
            }).then(function (r) { return r.json(); }).then(function (data) {
                if (data.success) {
                    var payload = { id: data.message_id, sender_id: currentUserId, receiver_id: currentChatUser, message_type: 'code', code_snippet: raw, content: '', timestamp: new Date().toISOString(), sender_image: null };
                    displayMessage(payload);
                    updateSidebarLastMessage(currentChatUser, 'Code', 'code', new Date().toISOString());
                } else if (data.error) {
                    alert('Failed to send code: ' + data.error);
                }
            }).catch(function () {});
        }
    </script>

    <!-- Image Lightbox (legacy) -->
    <div id="imageLightbox" class="image-lightbox" onclick="closeImageLightbox()">
        <button class="lightbox-close" onclick="closeImageLightbox(); event.stopPropagation();">&times;</button>
        <img id="lightboxImage" class="lightbox-content" src="" alt="Full size image" onclick="event.stopPropagation()">
    </div>

    <!-- Media modal: image/video/file with download -->
    <div id="mediaModal" class="media-modal" onclick="if(event.target===this) closeMediaModal()">
        <button type="button" class="media-close" onclick="closeMediaModal(); event.stopPropagation();">&times; Close</button>
        <button type="button" class="media-download" id="mediaDownloadBtn" onclick="downloadMedia(); event.stopPropagation();">Download</button>
        <img id="mediaImage" class="media-content" style="display:none;" alt="Image" onclick="event.stopPropagation()">
        <video id="mediaVideo" class="media-content" controls style="display:none;" onclick="event.stopPropagation()"></video>
        <a id="mediaFileLink" href="#" target="_blank" rel="noopener" style="display:none; color:#fff; padding:1rem;" onclick="event.stopPropagation()">Open / Download file</a>
    </div>

    <!-- Code send modal -->
    <div id="codeSendModal" class="modal-overlay" onclick="if(event.target===this) closeCodeSendModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3 style="margin-top:0;">Share Code</h3>
            <textarea id="codeSendText" placeholder="Paste your code here..."></textarea>
            <div class="modal-actions">
                <button type="button" onclick="closeCodeSendModal()">Cancel</button>
                <button type="button" onclick="submitCodeMessage()">Send</button>
            </div>
        </div>
    </div>

    <!-- Incoming call modal -->
    <div id="incomingCallModal" class="call-modal">
        <p id="incomingCallText">Incoming call...</p>
        <div class="call-duration" id="incomingCallDuration"></div>
        <div class="call-actions">
            <button type="button" class="call-accept" id="incomingCallAccept" title="Accept">&#9742;</button>
            <button type="button" class="call-reject" id="incomingCallReject" title="Reject">&#9741;</button>
        </div>
    </div>

    <!-- Outgoing / active call modal -->
    <div id="activeCallModal" class="call-modal">
        <p id="activeCallText">Calling...</p>
        <div class="call-duration" id="activeCallDuration">00:00</div>
        <video id="localVideo" class="local-video" autoplay muted playsinline style="display:none;"></video>
        <video id="remoteVideo" class="remote-video" autoplay playsinline style="display:none;"></video>
        <div class="call-actions">
            <button type="button" class="call-end" id="endCallBtn" title="End call">&#9741;</button>
        </div>
    </div>
</body>
